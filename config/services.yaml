# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    car_picture_directory: '%kernel.project_dir%/public/uploads'
    app.supported_locales: ['en', 'de', 'nl', 'fr', 'es', 'pl']
    app.mailer_from_email: '%env(MAILER_FROM_EMAIL)%'
    app.mailer_from_name: '%env(MAILER_FROM_NAME)%'
    app.homepage_url: '%env(APP_HOMEPAGE_URL)%'
    app.superadmin_emails: '%env(default::SUPERADMIN)%'
    app.api_refresh_token_ttl: 2592000

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $homepageUrl: '%app.homepage_url%'
            string $superAdminEmails: '%app.superadmin_emails%'
            string $mailerFromEmail: '%app.mailer_from_email%'
            string $mailerFromName: '%app.mailer_from_name%'
            string $kernelSecret: '%kernel.secret%'
            int $refreshTokenTtl: '%app.api_refresh_token_ttl%'
            int $accessTokenTtl: '%lexik_jwt_authentication.token_ttl%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\EventSubscriber\CalendarSubscriber:

    App\EventSubscriber\UserLocaleSubscriber:

    App\Service\FileUploaderService:
        arguments:
            $targetDirectory: '%car_picture_directory%'

    App\MessageHandler\Event\InformUserWhenTripAdded:
        arguments:
            $mailerFromEmail: '%app.mailer_from_email%'
            $mailerFromName: '%app.mailer_from_name%'

    App\State\ExpenseStateProcessor:
        arguments:
            $inner: '@api_platform.doctrine.orm.state.persist_processor'

    App\State\ParkingLocationStateProcessor:
        arguments:
            $inner: '@api_platform.doctrine.orm.state.persist_processor'

    App\State\TripStateProcessor: ~
    App\State\BookingStateProcessor: ~
    App\State\BookingDeleteProcessor: ~
    App\State\PaymentStateProcessor: ~

    App\State\MessageDeleteProcessor:
        arguments:
            $inner: '@api_platform.doctrine.orm.state.remove_processor'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
