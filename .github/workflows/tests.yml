name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_sqlite, gd
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        env:
          APP_ENV: test

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --no-interaction
        env:
          APP_ENV: test

      - name: Run unit tests
        run: php bin/phpunit --testsuite Unit

      - name: Run API tests
        run: php bin/phpunit --testsuite Api
