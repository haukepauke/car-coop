name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: intl, pdo_sqlite, gd
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4
        env:
          APP_ENV: test

      - name: Audit Composer dependencies
        run: composer audit --locked

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Audit npm dependencies
        run: npm audit --package-lock-only

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --no-interaction
        env:
          APP_ENV: test

      - name: Run unit tests
        run: php bin/phpunit --testsuite Unit

      - name: Run API tests
        run: php bin/phpunit --testsuite Api
