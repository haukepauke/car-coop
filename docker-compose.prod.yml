services:
  app:
    image: car-coop:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "mysql://${DB_USER:-carcoop}:${DB_PASSWORD}@db:3306/${DB_NAME:-carcoop}?serverVersion=10.4"
      MAILER_DSN: "${MAILER_DSN:-null://null}"
      MAILER_FROM_EMAIL: "${MAILER_FROM_EMAIL:-noreply@example.com}"
      MAILER_FROM_NAME: "${MAILER_FROM_NAME:-Car Coop}"
      APP_HOMEPAGE_URL: "${APP_HOMEPAGE_URL:-http://localhost}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  messenger:
    image: car-coop:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: >
      php bin/console messenger:consume async
      --time-limit=300
      --memory-limit=128M
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "mysql://${DB_USER:-carcoop}:${DB_PASSWORD}@db:3306/${DB_NAME:-carcoop}?serverVersion=10.4"
      MAILER_DSN: "${MAILER_DSN:-null://null}"
      MAILER_FROM_EMAIL: "${MAILER_FROM_EMAIL:-noreply@example.com}"
      MAILER_FROM_NAME: "${MAILER_FROM_NAME:-Car Coop}"
      APP_HOMEPAGE_URL: "${APP_HOMEPAGE_URL:-http://localhost}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_NAME:-carcoop}"
      MYSQL_USER: "${DB_USER:-carcoop}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

volumes:
  db_data:
  uploads:

networks:
  backend:
