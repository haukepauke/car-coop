tour:
  banner:
    title: "Jesteś tu nowy? Zrób krótkie wprowadzenie!"
    desc: "Przeprowadzimy Cię przez najważniejsze funkcje Car Coop."
    start: Rozpocznij wprowadzenie
    dismiss: Nie jestem zainteresowany
  welcome:
    title: "Witaj w Car Coop!"
    desc: "To krótkie wprowadzenie zapozna Cię z najważniejszymi funkcjami. Możesz je pominąć w dowolnym momencie."
  car:
    title: Twój pojazd
    desc: "Każdy panel przedstawia jeden pojazd. Kliknij nagłówek, aby go rozwinąć i zobaczyć wszystkie szczegóły."
  stats:
    title: Dane pojazdu
    desc: "Kluczowe informacje o pojeździe — tablica rejestracyjna, przebieg, roczny dystans, koszty, rodzaj paliwa i zużycie — są wyświetlane tutaj jako karty."
  bookings:
    title: Nadchodzące rezerwacje
    desc: "Tutaj wyświetlane są następne zaplanowane rezerwacje, dzięki czemu zawsze wiesz, kiedy pojazd jest dostępny."
  charts:
    title: Statystyki
    desc: "Te wykresy pokazują przebyty dystans oraz bilans między członkami w czasie."
  nav:
    messages:
      title: Tablica ogłoszeń
      desc: "Udostępniaj wiadomości, pytania lub aktualizacje wszystkim członkom swojej spółdzielni samochodowej."
    calendar:
      title: Kalendarz rezerwacji
      desc: "Sprawdź, kiedy pojazd jest zarezerwowany i zarezerwuj go na własne przejazdy."
    trips:
      title: Przejazdy
      desc: "Rejestruj każdy przejazd — dystans, datę i cel. To jest podstawa do obliczania kosztów."
    expenses:
      title: Wydatki
      desc: "Zapisuj koszty paliwa, napraw i inne wydatki. Są one odejmowane od obliczonych kosztów Twoich przejazdów."
    payments:
      title: Płatności
      desc: "Śledź transfery pieniężne między członkami w celu rozliczenia zaległych sald."
    parking:
      title: Miejsce parkingowe
      desc: "Sprawdź na mapie, gdzie aktualnie zaparkowany jest pojazd, i zaktualizuj lokalizację po zaparkowaniu."
    admin:
      title: Administracja
      desc: "Dodawaj pojazdy lub zarządzaj nimi oraz kontroluj, kto ma dostęp do spółdzielni."
    user:
      title: Twój profil
      desc: "Edytuj swoje dane osobowe lub wyloguj się stąd."
  progress: "{{current}} z {{total}}"
  btn:
    next: Dalej
    prev: Wstecz
    done: Gotowe

board_system:
  trip_added: "<strong>%user%</strong> dodał nowy przejazd z <strong>%car%</strong>."
  booking_added: "<strong>%user%</strong> dodał nową rezerwację dla <strong>%car%</strong> (<em>%start%</em> – <em>%end%</em>)."
  booking_updated: "<strong>%user%</strong> zaktualizował rezerwację dla <strong>%car%</strong>."
  booking_deleted: "<strong>%user%</strong> usunął rezerwację dla <strong>%car%</strong>: <em>%title%</em> (%start% – %end%)."
  payment_added: "<strong>%from%</strong> wysłał płatność do <strong>%to%</strong> za <strong>%car%</strong>."
  invitation_created: "<strong>%user%</strong> zaprosił <em>%email%</em> do dołączenia do <strong>%car%</strong>."
  invitation_accepted: "<strong>%user%</strong> dołączył do <strong>%car%</strong>."
  user_removed: "<strong>%user%</strong> opuścił lub został usunięty z <strong>%car%</strong>."
  price_per_unit_changed: "Cena za jednostkę dla grupy <strong>%group%</strong> w <strong>%car%</strong> została zmieniona z %old_price% € na <strong>%new_price% €</strong>."
  milestone_100k: |
    <p><strong>%car%</strong> właśnie osiągnął <strong>100 000 %unit%</strong>! Licznik przebił barierę sześciu cyfr — historyczny moment!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;If everything seems under control, you're not going fast enough.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Mario Andretti</figcaption></figure>
  milestone_200k: |
    <p><strong>%car%</strong> przekracza <strong>200 000 %unit%</strong>! Dwieście tysięcy — to mniej więcej pięć okrążeń równika Ziemi. Nie trzeba tu nic analizować — to czyste poświęcenie!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;When you win, you don't examine it very much. It is only when you lose that you think about it.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Niki Lauda</figcaption></figure>
  milestone_300k: |
    <p><strong>%car%</strong> osiąga <strong>300 000 %unit%</strong>! Można by dotrzeć na Księżyc i prawie wrócić. I wyraźnie widać, że <strong>%car%</strong> dał z siebie wszystko!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;You commit yourself to such a level that there's no compromise. You give everything you have.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Ayrton Senna</figcaption></figure>
  milestone_400k: |
    <p><strong>%car%</strong> z impetem mija <strong>400 000 %unit%</strong>! To dystans do Księżyca — osiągnięty na czterech kółkach! Żadnych katastrof — tylko chwalebny przebieg!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;To achieve anything in this game, you must be prepared to dabble on the boundary of disaster.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Stirling Moss</figcaption></figure>
  milestone_500k: |
    <p>PÓŁ MILIONA! <strong>%car%</strong> spokojnie mija <strong>500 000 %unit%</strong>! Pięćset tysięcy — w połowie drogi do legendy. Dziś wszystko złożyło się w piękną całość.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;There are so many things that had to come together: the car, the team, the driver.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Michael Schumacher</figcaption></figure>
  milestone_600k: |
    <p><strong>%car%</strong> przebija się przez <strong>600 000 %unit%</strong>! To piętnaście okrążeń równika Ziemi. A <strong>%car%</strong> towarzyszył nam przez każdy kilometr zmian.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Change will not come if we wait for some other person or some other time. We are the ones we've been waiting for.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Barack Obama</figcaption></figure>
  milestone_700k: |
    <p><strong>%car%</strong> wystrzelił poza <strong>700 000 %unit%</strong>! Na tym dystansie prawie pokonałeś trasę z Ziemi do Wenus. Sami nie powiedzielibyśmy tego lepiej.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;I just like going fast.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Jim Clark</figcaption></figure>
  milestone_800k: |
    <p><strong>%car%</strong> z rykiem mija <strong>800 000 %unit%</strong>! Tylko 200 000 dzieli go od magicznego miliona! <strong>%car%</strong> jest żywym — i jeżdżącym — dowodem!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Racing is a great mania to which one must sacrifice everything.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Sébastien Loeb</figcaption></figure>
  milestone_900k: |
    <p><strong>%car%</strong> grzmi przez <strong>900 000 %unit%</strong>! Przedostatni kamień milowy — zostało tylko sto tysięcy! Dla <strong>%car%</strong> to zdecydowanie początek końca — drogi do miliona!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;This is not the end. It is not even the beginning of the end. But it is, perhaps, the end of the beginning.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Winston Churchill</figcaption></figure>
  milestone_1000k: |
    <p>MILION! <strong>%car%</strong> zdobywa ostateczny kamień milowy: <strong>1 000 000 %unit%</strong>! Dziś <strong>%car%</strong> wykonuje swój własny olbrzymi skok w historię motoryzacji. GRATULACJE!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;That's one small step for man, one giant leap for mankind.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Neil Armstrong</figcaption></figure>
  milestone_repeating: |
    <p><strong>%car%</strong> właśnie minął <strong>%milestone% %unit%</strong> — cóż za pięknie poetycka liczba! Takie powtarzające się cyfry nie pojawiają się każdego dnia.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;The Road goes ever on and on, down from the door where it began.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; J.R.R. Tolkien</figcaption></figure>
