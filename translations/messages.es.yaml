tour:
  banner:
    title: "Comprende cómo funciona vuestro grupo de coche compartido"
    desc: "Puedes iniciar el recorrido otra vez en cualquier momento. Oculta este recordatorio solo cuando realmente ya no lo necesites."
    start: Iniciar recorrido
    hide: Ocultar este recordatorio
  welcome:
    title: "¡Bienvenido a Car Coop!"
    desc: |
      <img src="%carImage%" alt="">
      <p>Car Coop sigue una idea sencilla: <strong>un vehículo compartido debe ser transparente, justo y fácil de organizar en conjunto</strong>.</p>
      <p>Para lograrlo, las personas de un grupo registran tanto su uso del vehículo como sus aportaciones económicas:</p>
      <ul>
        <li><strong>Los trayectos</strong> registran quién condujo y cuánto recorrió.</li>
        <li><strong>Los gastos</strong> registran combustible, reparaciones, seguros y otros costes compartidos.</li>
        <li><strong>Los pagos</strong> equilibran los saldos entre los miembros.</li>
      </ul>
      <p>Así se genera un saldo continuo para cada miembro. El grupo puede ver en todo momento quién ya ha asumido mucho, quién ha contribuido menos hasta ahora y qué precio por kilómetro sería justo y económicamente razonable.</p>
  car:
    title: Tu vehículo
    desc: |
      <p>Cada vehículo tiene aquí su propia sección. Es posible compartir más de un vehículo.</p>
      <p>Allí Car Coop reúne toda la información relevante: usuarios, costes, reservas, estadísticas y detalles operativos.</p>
  actions:
    title: Herramientas importantes
    desc: |
      <p>Estos tres botones ofrecen acceso rápido a funciones importantes del vehículo.</p>
      <ul>
        <li><strong>Calculadora de costes</strong>: estima el coste de un trayecto planificado a partir del precio por kilómetro y de la distancia estimada del trayecto. Sobre todo al principio, esto ayuda a hacerse una idea del coste de un viaje.</li>
        <li><strong>Análisis</strong>: abre el análisis de costes del vehículo y muestra propuestas para pagos de compensación y cambios en el precio por kilómetro. Esta función tiene más sentido cuando ya habéis registrado algunos trayectos. Cuantas más entradas haya, más útil será el análisis.</li>
        <li><strong>Exportar PDF</strong>: crea un resumen en PDF de todos los datos relacionados con este vehículo, como trayectos, gastos, pagos, etc. Útil para archivar o para revisar todo juntos alrededor de la mesa de la cocina.</li>
      </ul>
  stats:
    title: Datos del vehículo
    desc: |
      <p>Estas tarjetas resumen los indicadores actuales del vehículo y del grupo de uso compartido.</p>
      <ul>
        <li><strong>El kilometraje</strong> y <strong>la distancia anual</strong> muestran cuán intensamente se utiliza el coche.</li>
        <li><strong>Los costes anuales</strong> y <strong>el coste calculado por kilómetro</strong> muestran cuánto cuesta realmente el vehículo.</li>
        <li>Estos valores sirven de base para comprobar si los precios de los grupos de usuarios siguen siendo justos y económicamente razonables.</li>
      </ul>
  bookings:
    title: Próximas reservas
    desc: |
      <p>El calendario de reservas permite reservar el vehículo para periodos concretos.</p>
      <p>Responde a la pregunta <strong>“¿Quién tiene el coche y cuándo?”</strong> y hace que el uso del vehículo sea previsible para todos.</p>
  charts:
    title: Estadísticas
    desc: |
      <p>Los gráficos convierten los datos cotidianos en una visión a largo plazo para el grupo.</p>
      <ul>
        <li><strong>El gráfico de distancia</strong> muestra quién ha recorrido cuánto con el vehículo.</li>
        <li><strong>El gráfico de saldo</strong> muestra si algunos usuarios se están desviando demasiado hacia positivo o negativo.</li>
      </ul>
      <p>Así podéis ver cuándo son útiles los pagos de compensación o los ajustes de precio.</p>
  nav:
    messages:
      title: Tablón de mensajes
      desc: "<p>El tablón es el espacio de comunicación compartido de vuestro grupo de coche compartido.</p><p>Aquí podéis compartir avisos de reparación, acuerdos, recordatorios e información organizativa.</p>"
    calendar:
      title: Calendario de reservas
      desc: "<p>El calendario de reservas permite al grupo planificar el uso compartido.</p><p>Aquí veis la disponibilidad del vehículo, lo reserváis y evitáis solapamientos entre reservas.</p>"
    trips:
      title: Trayectos
      desc: |
        <p>Los trayectos son el libro de trayectos del grupo.</p>
        <p>Las distancias recorridas reparten los costes compartidos del vehículo entre los distintos miembros.</p>
        <p>Al final del trayecto lo registráis aquí con el kilometraje final, la fecha y el tipo de trayecto. Algunos tipos son de pago y otros gratuitos. Un trayecto al taller, por ejemplo, normalmente debería ser gratuito porque beneficia a todo el grupo. Cómo reguláis los trayectos gratuitos y de pago queda, por supuesto, en manos de vuestra propia comunidad.</p>
        <p>Si habéis creado distintos grupos de uso, podéis acordar un precio por kilómetro distinto para cada uno. Esto puede tener sentido, por ejemplo, si las personas que solo conducen muy rara vez y no participan en el mantenimiento del vehículo deberían pagar un precio más alto. O si las personas con ingresos más bajos deberían pagar un precio por kilómetro menor que aquellas con ingresos más altos.</p>
        <p>El coste de un trayecto se registra como deuda en vuestra cuenta. Los gastos que tuvisteis durante el trayecto, por ejemplo al repostar, se descuentan de esa deuda una vez que se registran en gastos.</p>
    expenses:
      title: Gastos
      desc: |
        <p>Los gastos son el libro de aportaciones.</p>
        <p>Quien paga combustible, mantenimiento, neumáticos u otros costes compartidos recibe ese aporte acreditado de nuevo en su cuenta.</p>
        <p>Debéis hablar dentro del grupo sobre qué gastos son deducibles. El combustible, el aceite y el líquido limpiaparabrisas son evidentes. Si también lo es un ambientador con olor a coche nuevo, eso ya puede dar pie a una discusión.</p>
    payments:
      title: Pagos
      desc: |
        <p>Los pagos equilibran los saldos entre los miembros.</p>
        <p>Si se acumulan saldos positivos o negativos más grandes, podéis documentar aquí los pagos de compensación.</p>
        <p>Si alguien del grupo entrega o transfiere dinero a otra persona para equilibrar las cuentas, simplemente se registra aquí.</p>
    parking:
      title: Ubicación de aparcamiento
      desc: |
        <p>La página de aparcamiento resuelve el último problema práctico de compartir: ¿dónde está el coche ahora mismo?</p>
        <p>Desde allí podéis navegar hasta el vehículo y guardar vosotros mismos la posición actual cuando termináis un trayecto.</p>
        <p>Así la siguiente persona encuentra el coche sin mensajes adicionales.</p>
        <p><strong>¡No os olvidéis de hacerlo al final del trayecto!</strong> Probablemente le ahorrará algo de estrés a la siguiente persona usuaria.</p>
        <p>Nota: en el smartphone, Car Coop utiliza el sistema de localización del teléfono para guardar la posición. Si eso no funciona, podéis fijar y guardar la posición manualmente en el mapa.</p>
    admin:
      title: Administración
      desc: |
        <p>En el área de administración mantenéis las reglas de vuestro grupo de coche compartido.</p>
        <p>Allí gestionáis miembros, grupos de usuarios, precios por kilómetro, invitaciones para nuevos usuarios y otros ajustes básicos.</p>
        <p>Si personas abandonan el grupo, podéis desactivar allí sus cuentas. Los registros de trayectos y gastos permanecen intactos.</p>
        <p>Car Coop tiene un concepto de administración muy abierto: cualquier miembro del grupo puede hacer cambios. Os corresponde a vosotros acordar si todas las personas están de acuerdo con esos cambios. Car Coop no puede ni quiere asumir esa responsabilidad por vosotros.</p>
    user:
      title: Tu perfil
      desc: |
        <p>En el perfil gestionas idioma, diseño, notificaciones y ajustes personales.</p>
        <p>Si quieres, también puedes volver a activar allí el recordatorio del recorrido más adelante.</p>
  progress: "{{current}} de {{total}}"
  btn:
    next: Siguiente
    prev: Atrás
    done: Hecho

board_system:
  trip_added: "<strong>%user%</strong> añadió un nuevo trayecto con <strong>%car%</strong>."
  booking_added: "<strong>%user%</strong> añadió una nueva reserva para <strong>%car%</strong> (<em>%start%</em> – <em>%end%</em>)."
  booking_updated: "<strong>%user%</strong> actualizó una reserva para <strong>%car%</strong>."
  booking_deleted: "<strong>%user%</strong> eliminó una reserva para <strong>%car%</strong>: <em>%title%</em> (%start% – %end%)."
  payment_added: "<strong>%from%</strong> envió un pago a <strong>%to%</strong> para <strong>%car%</strong>."
  invitation_created: "<strong>%user%</strong> invitó a <em>%email%</em> a unirse a <strong>%car%</strong>."
  invitation_accepted: "<strong>%user%</strong> se unió a <strong>%car%</strong>."
  user_removed: "<strong>%user%</strong> salió o fue eliminado de <strong>%car%</strong>."
  price_per_unit_changed: "El precio por unidad para el grupo <strong>%group%</strong> en <strong>%car%</strong> ha cambiado de %old_price% € a <strong>%new_price% €</strong>."
  milestone_100k: |
    <p><strong>%car%</strong> acaba de alcanzar <strong>100.000 %unit%</strong>! ¡El cuentakilómetros ha superado las seis cifras — un momento histórico!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;If everything seems under control, you're not going fast enough.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Mario Andretti</figcaption></figure>
  milestone_200k: |
    <p><strong>%car%</strong> supera los <strong>200.000 %unit%</strong>! Doscientos mil — aproximadamente cinco vueltas al ecuador de la Tierra. Aquí no hace falta reflexionar — ¡esto es pura dedicación!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;When you win, you don't examine it very much. It is only when you lose that you think about it.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Niki Lauda</figcaption></figure>
  milestone_300k: |
    <p><strong>%car%</strong> alcanza los <strong>300.000 %unit%</strong>! Podrías haber conducido hasta la Luna y casi de vuelta. ¡Y está claro que <strong>%car%</strong> lo ha dado todo!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;You commit yourself to such a level that there's no compromise. You give everything you have.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Ayrton Senna</figcaption></figure>
  milestone_400k: |
    <p><strong>%car%</strong> supera con creces los <strong>400.000 %unit%</strong>! ¡Esa es la distancia hasta la Luna — lograda sobre cuatro ruedas! Aquí no hay desastres — ¡solo un kilometraje glorioso!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;To achieve anything in this game, you must be prepared to dabble on the boundary of disaster.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Stirling Moss</figcaption></figure>
  milestone_500k: |
    <p>¡MEDIO MILLÓN! <strong>%car%</strong> supera los <strong>500.000 %unit%</strong>! Quinientos mil — a medio camino del estatus de leyenda. Hoy, todo encajó a la perfección.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;There are so many things that had to come together: the car, the team, the driver.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Michael Schumacher</figcaption></figure>
  milestone_600k: |
    <p><strong>%car%</strong> atraviesa los <strong>600.000 %unit%</strong>! Son quince vueltas al ecuador de la Tierra. Y <strong>%car%</strong> nos ha llevado a través de cada kilómetro de cambio.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Change will not come if we wait for some other person or some other time. We are the ones we've been waiting for.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Barack Obama</figcaption></figure>
  milestone_700k: |
    <p><strong>%car%</strong> dispara su marcador más allá de los <strong>700.000 %unit%</strong>! A esta distancia casi has cubierto la ruta de la Tierra a Venus. Nosotros no lo habríamos dicho mejor.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;I just like going fast.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Jim Clark</figcaption></figure>
  milestone_800k: |
    <p><strong>%car%</strong> supera los <strong>800.000 %unit%</strong>! ¡Solo quedan 200.000 para el mágico millón! <strong>%car%</strong> es la prueba viviente — ¡y rodante!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Racing is a great mania to which one must sacrifice everything.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Sébastien Loeb</figcaption></figure>
  milestone_900k: |
    <p><strong>%car%</strong> ruge a través de los <strong>900.000 %unit%</strong>! El penúltimo hito — ¡solo cien mil más por delante! Para <strong>%car%</strong>, esto es sin duda el principio del fin — ¡del camino hacia el millón!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;This is not the end. It is not even the beginning of the end. But it is, perhaps, the end of the beginning.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Winston Churchill</figcaption></figure>
  milestone_1000k: |
    <p>¡UN MILLÓN! <strong>%car%</strong> conquista el hito definitivo: <strong>1.000.000 %unit%</strong>! Hoy, <strong>%car%</strong> da su propio salto gigante hacia la historia del automóvil. ¡FELICIDADES!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;That's one small step for man, one giant leap for mankind.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Neil Armstrong</figcaption></figure>
  milestone_repeating: |
    <p><strong>%car%</strong> acaba de superar los <strong>%milestone% %unit%</strong> — ¡qué número tan bellamente poético! Esos dígitos repetidos no aparecen todos los días.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;The Road goes ever on and on, down from the door where it began.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; J.R.R. Tolkien</figcaption></figure>
