tour:
  banner:
    title: "¿Eres nuevo? ¡Haz un recorrido rápido!"
    desc: "Te guiaremos por las funciones principales de Car Coop."
    start: Iniciar recorrido
    dismiss: No me interesa
  welcome:
    title: "¡Bienvenido a Car Coop!"
    desc: "Este breve recorrido te presentará las funciones más importantes. Puedes omitirlo en cualquier momento."
  car:
    title: Tu vehículo
    desc: "Cada panel muestra un vehículo. Haz clic en la cabecera para expandirlo y ver todos los detalles."
  stats:
    title: Datos del vehículo
    desc: "Los datos clave del vehículo — matrícula, kilometraje, distancia anual, costes, tipo de combustible y consumo — se muestran aquí como tarjetas."
  bookings:
    title: Próximas reservas
    desc: "Las próximas reservas programadas se listan aquí para que siempre sepas cuándo está disponible el vehículo."
  charts:
    title: Estadísticas
    desc: "Estos gráficos muestran la distancia recorrida y el balance entre los miembros a lo largo del tiempo."
  nav:
    messages:
      title: Tablón de mensajes
      desc: "Comparte noticias, preguntas o actualizaciones con todos los miembros de tu cooperativa de vehículos."
    calendar:
      title: Calendario de reservas
      desc: "Consulta cuándo está reservado el vehículo y resérvalo para tus propios viajes."
    trips:
      title: Trayectos
      desc: "Registra cada trayecto que realices — distancia, fecha y propósito. Esta es la base para el cálculo de costes."
    expenses:
      title: Gastos
      desc: "Registra combustible, reparaciones y otros costes. Estos se descuentan de los costes calculados de tus trayectos."
    payments:
      title: Pagos
      desc: "Registra las transferencias de dinero entre miembros para saldar los saldos pendientes."
    parking:
      title: Ubicación de aparcamiento
      desc: "Consulta en un mapa dónde está aparcado el vehículo actualmente y actualiza la ubicación cuando lo aparques."
    admin:
      title: Administración
      desc: "Añade o gestiona vehículos y controla quién tiene acceso a la cooperativa."
    user:
      title: Tu perfil
      desc: "Edita tus datos personales o cierra sesión desde aquí."
  progress: "{{current}} de {{total}}"
  btn:
    next: Siguiente
    prev: Atrás
    done: Hecho

board_system:
  trip_added: "<strong>%user%</strong> añadió un nuevo trayecto con <strong>%car%</strong>."
  booking_added: "<strong>%user%</strong> añadió una nueva reserva para <strong>%car%</strong> (<em>%start%</em> – <em>%end%</em>)."
  booking_updated: "<strong>%user%</strong> actualizó una reserva para <strong>%car%</strong>."
  booking_deleted: "<strong>%user%</strong> eliminó una reserva para <strong>%car%</strong>: <em>%title%</em> (%start% – %end%)."
  payment_added: "<strong>%from%</strong> envió un pago a <strong>%to%</strong> para <strong>%car%</strong>."
  invitation_created: "<strong>%user%</strong> invitó a <em>%email%</em> a unirse a <strong>%car%</strong>."
  invitation_accepted: "<strong>%user%</strong> se unió a <strong>%car%</strong>."
  user_removed: "<strong>%user%</strong> salió o fue eliminado de <strong>%car%</strong>."
  price_per_unit_changed: "El precio por unidad para el grupo <strong>%group%</strong> en <strong>%car%</strong> ha cambiado de %old_price% € a <strong>%new_price% €</strong>."
  milestone_100k: |
    <p><strong>%car%</strong> acaba de alcanzar <strong>100.000 %unit%</strong>! ¡El cuentakilómetros ha superado las seis cifras — un momento histórico!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;If everything seems under control, you're not going fast enough.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Mario Andretti</figcaption></figure>
  milestone_200k: |
    <p><strong>%car%</strong> supera los <strong>200.000 %unit%</strong>! Doscientos mil — aproximadamente cinco vueltas al ecuador de la Tierra. Aquí no hace falta reflexionar — ¡esto es pura dedicación!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;When you win, you don't examine it very much. It is only when you lose that you think about it.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Niki Lauda</figcaption></figure>
  milestone_300k: |
    <p><strong>%car%</strong> alcanza los <strong>300.000 %unit%</strong>! Podrías haber conducido hasta la Luna y casi de vuelta. ¡Y está claro que <strong>%car%</strong> lo ha dado todo!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;You commit yourself to such a level that there's no compromise. You give everything you have.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Ayrton Senna</figcaption></figure>
  milestone_400k: |
    <p><strong>%car%</strong> supera con creces los <strong>400.000 %unit%</strong>! ¡Esa es la distancia hasta la Luna — lograda sobre cuatro ruedas! Aquí no hay desastres — ¡solo un kilometraje glorioso!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;To achieve anything in this game, you must be prepared to dabble on the boundary of disaster.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Stirling Moss</figcaption></figure>
  milestone_500k: |
    <p>¡MEDIO MILLÓN! <strong>%car%</strong> supera los <strong>500.000 %unit%</strong>! Quinientos mil — a medio camino del estatus de leyenda. Hoy, todo encajó a la perfección.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;There are so many things that had to come together: the car, the team, the driver.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Michael Schumacher</figcaption></figure>
  milestone_600k: |
    <p><strong>%car%</strong> atraviesa los <strong>600.000 %unit%</strong>! Son quince vueltas al ecuador de la Tierra. Y <strong>%car%</strong> nos ha llevado a través de cada kilómetro de cambio.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Change will not come if we wait for some other person or some other time. We are the ones we've been waiting for.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Barack Obama</figcaption></figure>
  milestone_700k: |
    <p><strong>%car%</strong> dispara su marcador más allá de los <strong>700.000 %unit%</strong>! A esta distancia casi has cubierto la ruta de la Tierra a Venus. Nosotros no lo habríamos dicho mejor.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;I just like going fast.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Jim Clark</figcaption></figure>
  milestone_800k: |
    <p><strong>%car%</strong> supera los <strong>800.000 %unit%</strong>! ¡Solo quedan 200.000 para el mágico millón! <strong>%car%</strong> es la prueba viviente — ¡y rodante!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Racing is a great mania to which one must sacrifice everything.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Sébastien Loeb</figcaption></figure>
  milestone_900k: |
    <p><strong>%car%</strong> ruge a través de los <strong>900.000 %unit%</strong>! El penúltimo hito — ¡solo cien mil más por delante! Para <strong>%car%</strong>, esto es sin duda el principio del fin — ¡del camino hacia el millón!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;This is not the end. It is not even the beginning of the end. But it is, perhaps, the end of the beginning.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Winston Churchill</figcaption></figure>
  milestone_1000k: |
    <p>¡UN MILLÓN! <strong>%car%</strong> conquista el hito definitivo: <strong>1.000.000 %unit%</strong>! Hoy, <strong>%car%</strong> da su propio salto gigante hacia la historia del automóvil. ¡FELICIDADES!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;That's one small step for man, one giant leap for mankind.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Neil Armstrong</figcaption></figure>
  milestone_repeating: |
    <p><strong>%car%</strong> acaba de superar los <strong>%milestone% %unit%</strong> — ¡qué número tan bellamente poético! Esos dígitos repetidos no aparecen todos los días.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;The Road goes ever on and on, down from the door where it began.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; J.R.R. Tolkien</figcaption></figure>
