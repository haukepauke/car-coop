tour:
  banner:
    title: "Comprenez comment fonctionne votre coopérative d’autopartage"
    desc: "Vous pouvez relancer la visite à tout moment. Masquez ce rappel seulement lorsque vous n’en avez vraiment plus besoin."
    start: Commencer la visite
    hide: Masquer ce rappel
  welcome:
    title: "Bienvenue sur Car Coop !"
    desc: |
      <img src="%carImage%" alt="">
      <p>Car Coop repose sur une idée simple : <strong>un véhicule partagé doit rester transparent, équitable et facile à organiser ensemble</strong>.</p>
      <p>Pour cela, les membres d’un groupe enregistrent à la fois leur utilisation du véhicule et leurs contributions financières :</p>
      <ul>
        <li><strong>Les trajets</strong> indiquent qui a roulé et sur quelle distance.</li>
        <li><strong>Les dépenses</strong> enregistrent le carburant, les réparations, les assurances et les autres coûts partagés.</li>
        <li><strong>Les paiements</strong> équilibrent les soldes entre les membres.</li>
      </ul>
      <p>Il en résulte un solde courant pour chaque membre. Le groupe peut ainsi voir à tout moment qui a déjà beaucoup supporté, qui a encore peu contribué et quel prix au kilomètre serait actuellement juste et économiquement pertinent.</p>
  car:
    title: Votre véhicule
    desc: |
      <p>Chaque véhicule possède ici sa propre section. Il est possible de partager plus d’un véhicule.</p>
      <p>Car Coop y regroupe toutes les informations pertinentes : utilisateurs, coûts, réservations, statistiques et détails opérationnels.</p>
  actions:
    title: Outils importants
    desc: |
      <p>Ces trois boutons donnent un accès rapide à des fonctions importantes du véhicule.</p>
      <ul>
        <li><strong>Calculateur de coûts</strong> : estime le coût d’un trajet prévu à partir du prix au kilomètre et de la distance estimée du trajet. Cela aide surtout au début à se faire une idée du coût d’un trajet.</li>
        <li><strong>Analyse</strong> : ouvre l’analyse des coûts du véhicule et affiche des propositions de paiements d’équilibrage et de modifications du prix au kilomètre. Cette fonction devient vraiment utile lorsque vous avez déjà enregistré quelques trajets. Plus il y a de données, plus l’analyse est pertinente.</li>
        <li><strong>Export PDF</strong> : crée un résumé PDF de toutes les données liées à ce véhicule, comme les trajets, les dépenses, les paiements, etc. Pratique pour archiver ou pour faire un point ensemble autour de la table de cuisine.</li>
      </ul>
  stats:
    title: Données du véhicule
    desc: |
      <p>Ces cartes résument les indicateurs actuels du véhicule et du groupe de partage.</p>
      <ul>
        <li><strong>Le kilométrage</strong> et <strong>la distance annuelle</strong> montrent à quel point la voiture est utilisée.</li>
        <li><strong>Les coûts annuels</strong> et <strong>le coût calculé par kilomètre</strong> montrent ce que le véhicule coûte réellement.</li>
        <li>Ces valeurs servent de base pour vérifier si les prix des groupes d’utilisateurs restent équitables et économiquement pertinents.</li>
      </ul>
  bookings:
    title: Réservations à venir
    desc: |
      <p>Le calendrier de réservation permet de réserver le véhicule pour des périodes précises.</p>
      <p>Il répond à la question <strong>« Qui a la voiture, et quand ? »</strong> et rend l’utilisation du véhicule prévisible pour tout le monde.</p>
  charts:
    title: Statistiques
    desc: |
      <p>Les graphiques transforment les données du quotidien en compréhension à long terme pour le groupe.</p>
      <ul>
        <li><strong>Le graphique des distances</strong> montre qui a roulé combien avec le véhicule.</li>
        <li><strong>Le graphique des soldes</strong> montre si certains utilisateurs dérivent trop dans le positif ou le négatif.</li>
      </ul>
      <p>Vous voyez ainsi quand des paiements d’équilibrage ou des ajustements de prix deviennent utiles.</p>
  nav:
    messages:
      title: Tableau d'affichage
      desc: "<p>Le tableau d’affichage est l’espace de communication commun de votre groupe d’autopartage.</p><p>Vous pouvez y partager des informations sur des réparations, des accords, des rappels ou l’organisation du groupe.</p>"
    calendar:
      title: Calendrier des réservations
      desc: "<p>Le calendrier des réservations permet au groupe de planifier l’usage partagé.</p><p>Vous y voyez les disponibilités du véhicule, le réservez et évitez les chevauchements de réservations.</p>"
    trips:
      title: Trajets
      desc: |
        <p>Les trajets constituent le journal des trajets du groupe.</p>
        <p>Les distances parcourues répartissent les coûts partagés du véhicule entre les différents membres.</p>
        <p>À la fin d’un trajet, saisissez-le ici avec le kilométrage de fin, la date et le type de trajet. Certains types de trajets sont payants, d’autres gratuits. Un trajet vers le garage devrait par exemple généralement être gratuit, car il sert l’intérêt de tout le groupe. La manière d’organiser les trajets payants et gratuits reste toutefois à votre propre discrétion.</p>
        <p>Si vous avez créé différents groupes d’usage, vous pouvez convenir d’un prix au kilomètre distinct pour chacun d’eux. Cela peut être utile, par exemple, si des personnes qui roulent très rarement et ne participent pas à l’entretien du véhicule doivent payer un prix au kilomètre plus élevé. Ou si des personnes ayant un revenu plus faible doivent payer un prix inférieur à celles ayant un revenu plus élevé.</p>
        <p>Le coût d’un trajet est inscrit comme dette sur votre compte. Les dépenses engagées pendant le trajet, par exemple pour le carburant, sont déduites de cette dette dès qu’elles sont enregistrées dans les dépenses.</p>
    expenses:
      title: Dépenses
      desc: |
        <p>Les dépenses constituent le registre des contributions.</p>
        <p>Quiconque paie le carburant, l’entretien, les pneus ou d’autres coûts partagés voit cette contribution recréditée sur son compte.</p>
        <p>Les dépenses remboursables doivent être discutées au sein du groupe. Le carburant, l’huile et le liquide lave-glace vont de soi. En revanche, savoir si un sapin désodorisant senteur voiture neuve est remboursable peut prêter à débat.</p>
    payments:
      title: Paiements
      desc: |
        <p>Les paiements équilibrent les soldes entre les membres.</p>
        <p>Lorsque des crédits ou dettes plus importants s’accumulent, vous pouvez documenter ici les paiements d’équilibrage.</p>
        <p>Chaque fois qu’une personne du groupe remet ou vire de l’argent à une autre pour équilibrer les comptes, il suffit de l’enregistrer ici.</p>
    parking:
      title: Lieu de stationnement
      desc: |
        <p>La page de stationnement résout le dernier problème pratique du partage : où se trouve la voiture en ce moment ?</p>
        <p>Vous pouvez vous faire guider jusqu’au véhicule depuis cette page et enregistrer vous-même la position actuelle lorsque vous terminez un trajet.</p>
        <p>La personne suivante retrouve ainsi la voiture sans échange supplémentaire.</p>
        <p><strong>N’oubliez pas cela à la fin de votre trajet !</strong> Cela évitera probablement un peu de stress à la personne suivante.</p>
        <p>Remarque : sur smartphone, Car Coop utilise le système de localisation du téléphone pour enregistrer la position. Si cela ne fonctionne pas, vous pouvez définir et enregistrer manuellement la position sur la carte.</p>
    admin:
      title: Administration
      desc: |
        <p>La zone d’administration vous permet de maintenir les règles de votre groupe d’autopartage.</p>
        <p>Vous y gérez les membres, les groupes d’utilisateurs, les prix au kilomètre, les invitations pour de nouveaux utilisateurs et d’autres réglages de base.</p>
        <p>Si des personnes quittent le groupe, vous pouvez y désactiver leurs comptes. Les enregistrements de trajets et de dépenses restent conservés.</p>
        <p>Car Coop suit un concept d’administration très ouvert : chaque membre du groupe peut effectuer des modifications. C’est à vous de vous mettre d’accord pour savoir si tout le monde est d’accord avec ces changements. Car Coop ne peut ni ne veut prendre cette responsabilité à votre place.</p>
    user:
      title: Votre profil
      desc: |
        <p>Dans votre profil, vous gérez la langue, le thème, les notifications et vos préférences personnelles.</p>
        <p>Si vous le souhaitez, vous pouvez également y réactiver plus tard le rappel de la visite.</p>
  progress: "{{current}} sur {{total}}"
  btn:
    next: Suivant
    prev: Retour
    done: Terminer

board_system:
  trip_added: "<strong>%user%</strong> a ajouté un nouveau trajet avec <strong>%car%</strong>."
  booking_added: "<strong>%user%</strong> a ajouté une nouvelle réservation pour <strong>%car%</strong> (<em>%start%</em> – <em>%end%</em>)."
  booking_updated: "<strong>%user%</strong> a mis à jour une réservation pour <strong>%car%</strong>."
  booking_deleted: "<strong>%user%</strong> a supprimé une réservation pour <strong>%car%</strong> : <em>%title%</em> (%start% – %end%)."
  payment_added: "<strong>%from%</strong> a envoyé un paiement à <strong>%to%</strong> pour <strong>%car%</strong>."
  invitation_created: "<strong>%user%</strong> a invité <em>%email%</em> à rejoindre <strong>%car%</strong>."
  invitation_accepted: "<strong>%user%</strong> a rejoint <strong>%car%</strong>."
  user_removed: "<strong>%user%</strong> a quitté ou a été retiré de <strong>%car%</strong>."
  price_per_unit_changed: "Le prix par unité pour le groupe <strong>%group%</strong> dans <strong>%car%</strong> a été modifié de %old_price% € à <strong>%new_price% €</strong>."
  milestone_100k: |
    <p><strong>%car%</strong> vient d'atteindre <strong>100 000 %unit%</strong> ! Le compteur passe à six chiffres — un moment historique !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;If everything seems under control, you're not going fast enough.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Mario Andretti</figcaption></figure>
  milestone_200k: |
    <p><strong>%car%</strong> dépasse les <strong>200 000 %unit%</strong> ! Deux cent mille — environ cinq tours autour de l'équateur terrestre. Pas besoin d'analyse ici — c'est du dévouement à l'état pur !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;When you win, you don't examine it very much. It is only when you lose that you think about it.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Niki Lauda</figcaption></figure>
  milestone_300k: |
    <p><strong>%car%</strong> atteint <strong>300 000 %unit%</strong> ! Vous auriez pu conduire jusqu'à la Lune et faire une bonne partie du chemin retour. Et clairement, <strong>%car%</strong> a tout donné !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;You commit yourself to such a level that there's no compromise. You give everything you have.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Ayrton Senna</figcaption></figure>
  milestone_400k: |
    <p><strong>%car%</strong> franchit les <strong>400 000 %unit%</strong> ! C'est la distance jusqu'à la Lune — accomplie sur quatre roues ! Aucune catastrophe ici — rien que du kilométrage glorieux !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;To achieve anything in this game, you must be prepared to dabble on the boundary of disaster.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Stirling Moss</figcaption></figure>
  milestone_500k: |
    <p>UN DEMI-MILLION ! <strong>%car%</strong> croise la barre des <strong>500 000 %unit%</strong> ! Cinq cent mille — à mi-chemin du statut légendaire. Aujourd'hui, tout s'est parfaitement réuni.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;There are so many things that had to come together: the car, the team, the driver.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Michael Schumacher</figcaption></figure>
  milestone_600k: |
    <p><strong>%car%</strong> franchit les <strong>600 000 %unit%</strong> ! C'est quinze tours autour de l'équateur terrestre. Et <strong>%car%</strong> nous a portés à travers chaque kilomètre de changement.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Change will not come if we wait for some other person or some other time. We are the ones we've been waiting for.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Barack Obama</figcaption></figure>
  milestone_700k: |
    <p><strong>%car%</strong> dépasse les <strong>700 000 %unit%</strong> ! À cette distance, vous avez presque parcouru le trajet de la Terre à Vénus. On ne pouvait pas mieux dire.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;I just like going fast.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Jim Clark</figcaption></figure>
  milestone_800k: |
    <p><strong>%car%</strong> franchit en trombe les <strong>800 000 %unit%</strong> ! Plus que 200 000 avant le million magique ! <strong>%car%</strong> en est la preuve vivante — et roulante !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;Racing is a great mania to which one must sacrifice everything.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Sébastien Loeb</figcaption></figure>
  milestone_900k: |
    <p><strong>%car%</strong> tonne à travers les <strong>900 000 %unit%</strong> ! L'avant-dernier jalon — encore cent mille à parcourir ! Pour <strong>%car%</strong>, c'est bien le début de la fin — de la route vers le million !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;This is not the end. It is not even the beginning of the end. But it is, perhaps, the end of the beginning.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Winston Churchill</figcaption></figure>
  milestone_1000k: |
    <p>UN MILLION ! <strong>%car%</strong> conquiert le jalon ultime : <strong>1 000 000 %unit%</strong> ! Aujourd'hui, <strong>%car%</strong> fait son propre bond de géant dans l'histoire de l'automobile. FÉLICITATIONS !</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;That's one small step for man, one giant leap for mankind.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Neil Armstrong</figcaption></figure>
  milestone_repeating: |
    <p><strong>%car%</strong> vient de dépasser les <strong>%milestone% %unit%</strong> — quel chiffre magnifiquement poétique ! Ces chiffres répétitifs ne se voient pas tous les jours.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&ldquo;The Road goes ever on and on, down from the door where it began.&rdquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; J.R.R. Tolkien</figcaption></figure>
