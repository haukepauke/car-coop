tour:
  banner:
    title: "Nieuw hier? Volg een snelle rondleiding!"
    desc: "We laten je de belangrijkste functies van Car Coop zien."
    start: Rondleiding starten
    dismiss: Niet geïnteresseerd
  welcome:
    title: "Welkom bij Car Coop!"
    desc: "Deze korte rondleiding stelt je voor aan de belangrijkste functies. Je kunt hem op elk moment overslaan."
  car:
    title: Jouw voertuig
    desc: "Elk paneel toont één voertuig. Klik op de koptekst om het uit te vouwen en alle details te zien."
  stats:
    title: Voertuiggegevens
    desc: "Belangrijke informatie over het voertuig — kenteken, kilometerstand, jaarlijkse afstand, kosten, brandstoftype en verbruik — worden hier als kaarten weergegeven."
  bookings:
    title: Aankomende boekingen
    desc: "De volgende geplande boekingen worden hier weergegeven, zodat je altijd weet wanneer het voertuig beschikbaar is."
  charts:
    title: Statistieken
    desc: "Deze grafieken tonen de gereden afstand en het saldo tussen leden over de tijd."
  nav:
    messages:
      title: Prikbord
      desc: "Deel nieuws, vragen of updates met alle leden van jouw voertuigcoöperatie."
    calendar:
      title: Boekingskalender
      desc: "Bekijk wanneer het voertuig geboekt is en reserveer het voor je eigen ritten."
    trips:
      title: Ritten
      desc: "Registreer elke rit die je maakt — afstand, datum en doel. Dit is de basis voor de kostenberekening."
    expenses:
      title: Uitgaven
      desc: "Registreer brandstof, reparaties en andere kosten. Deze worden afgetrokken van de berekende kosten van je ritten."
    payments:
      title: Betalingen
      desc: "Houd geldoverdrachten tussen leden bij om openstaande saldi te vereffenen."
    parking:
      title: Parkeerlocatie
      desc: "Bekijk waar het voertuig momenteel geparkeerd staat op een kaart en werk de locatie bij wanneer je het parkeert."
    admin:
      title: Beheer
      desc: "Voeg voertuigen toe of beheer ze en bepaal wie toegang heeft tot de coöperatie."
    user:
      title: Jouw profiel
      desc: "Bewerk je persoonlijke gegevens of log hier uit."
  progress: "{{current}} van {{total}}"
  btn:
    next: Volgende
    prev: Terug
    done: Klaar

