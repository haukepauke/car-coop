
tour:
  banner:
    title: "Verstehe, wie eure Fahrgemeinschaft funktioniert"
    desc: "Du kannst die Tour jederzeit erneut starten. Blende diesen Hinweis erst aus, wenn du ihn wirklich nicht mehr brauchst."
    start: Tour starten
    hide: Hinweis ausblenden
  welcome:
    title: "Willkommen bei Car Coop!"
    desc: |
      <img src="%carImage%" alt="">
      <p>Car Coop folgt einer einfachen Idee: <strong>Ein gemeinsam genutztes Fahrzeug soll transparent, fair und leicht zusammen organisierbar sein</strong>.</p>
      <p>Dafür erfassen die Mitglieder einer Gruppe sowohl ihre Fahrzeugnutzung als auch ihre finanziellen Aufwendungen:</p>
      <ul>
        <li><strong>Fahrten</strong> dokumentieren, wer wie weit gefahren ist.</li>
        <li><strong>Ausgaben</strong> dokumentieren Tanken, Reparaturen, Versicherungen und andere gemeinsame Kosten.</li>
        <li><strong>Zahlungen</strong> gleichen Salden zwischen Mitgliedern aus.</li>
      </ul>
      <p>So entsteht für jedes Mitglied ein laufender Saldo. Die Gruppe sieht jederzeit, wer viel getragen hat, wer noch wenig beigetragen hat und welcher Kilometerpreis aktuell fair und ökonomisch sinnvoll wäre.</p>
  car:
    title: Dein Fahrzeug
    desc: |
      <p>Jedes Fahrzeug hat hier seinen eigenen Bereich. Es ist möglich mehr als ein Fahrzeug zu teilen.</p>
      <p>Dort bündelt Car Coop alle relevanten Informationen: Nutzende, Kosten, Buchungen, Statistiken und betriebliche Details.</p>
  actions:
    title: Wichtige Werkzeuge
    desc: |
      <p>Diese drei Buttons geben euch schnellen Zugriff auf wichtige Funktionen für das Fahrzeug.</p>
      <ul>
        <li><strong>Kostenrechner</strong>: Schätzt die Kosten einer geplanten Fahrt anhand des Kilometerpreises und der geschätzten Entfernung der Fahrt. Das soll euch gerade am Anfang helfen eine Idee über die Kosten einer Fahrt zu bekommen.</li>
        <li><strong>Auswertung</strong>: Öffnet die Kostenanalyse des Fahrzeugs und zeigt Vorschläge für Ausgleichszahlungen und Kilometerpreis-Änderungen. Diese Funktion macht erst richtig Sinn, wenn ihr schon einige Fahrten hinter euch habt. Je mehr Einträge desto genauer ist die Analyse.</li>
        <li><strong>PDF-Export</strong>: Erstellt eine PDF-Zusammenfassung aller Daten zu diesem Fahrzeug (Fahrten, Ausgaben, Zahlungen, etc.). Zum Abheften oder für gemeinsame Auswertungen am Küchentisch.</li>
      </ul>
  stats:
    title: Fahrzeugdaten
    desc: |
      <p>Diese Karten fassen die aktuellen Kennzahlen des Fahrzeugs und der Fahrgemeinschaft zusammen.</p>
      <ul>
        <li><strong>Kilometerstand</strong> und <strong>Jahresfahrleistung</strong> zeigen, wie intensiv das Auto genutzt wird.</li>
        <li><strong>Jahreskosten</strong> und <strong>berechnete Kosten pro Kilometer</strong> zeigen, was das Fahrzeug tatsächlich kostet.</li>
        <li>Diese Werte sind die Grundlage dafür, ob die Preise der Nutzungsgruppen noch fair und ökonomisch sinnvoll sind.</li>
      </ul>
  bookings:
    title: Nächste Buchungen
    desc: |
      <p>Der Buchungskalender erlaubt es das Fahrzeug für Zeiträume zu reservieren.</p>
      <p>Er beantwortet die Frage <strong>„Wer hat das Auto wann?“</strong> und machen die Fahrzeugnutzung so für alle verlässlich planbar.</p>
  charts:
    title: Statistiken
    desc: |
      <p>Die Diagramme machen aus Alltagsdaten langfristige Einsichten für die Gruppe.</p>
      <ul>
        <li><strong>Das Fahrleistungsdiagramm</strong> zeigt, wer wieviel mit dem Fahrzeug unterwegs war.</li>
        <li><strong>Das Saldodiagramm</strong> zeigt, ob einzelne Nutzende z.B. zu stark ins Plus oder Minus geraten.</li>
      </ul>
      <p>So erkennt ihr, wann Ausgleichszahlungen oder Preisänderungen sinnvoll werden.</p>
  nav:
    messages:
      title: Pinnwand
      desc: "<p>Die Pinnwand ist der gemeinsame Kommunikationsraum eurer Fahrgemeinschaft.</p><p>Hier könnt ihr Reparaturhinweise, Absprachen, Erinnerungen und organisatorische Informationen teilen.</p>"
    calendar:
      title: Buchungskalender
      desc: "<p>Der Buchungskalender erlaubt der Gemeinschaft die gemeinsame Nutzung zu planen.</p><p>Hier seht ihr die Verfügbarkeiten des Fahrzeugs, reserviert das Fahrzeug und vermeidet dabei Überschneidungen bei den Buchungen.</p>"
    trips:
      title: Fahrten
      desc: |
        <p>Fahrten sind das Fahrtenbuch der Gemeinschaft.</p>
        <p>Die gefahrenen Strecken verteilen die gemeinsamen Kosten des Fahrzeugs auf die einzelne Mitglieder.</p>
        <p>Am Ende eurer Fahrt tragt ihr sie hier ein mit dem Endkilometerstand, dem Datum und der Art der Fahrt. Manche Fahrtarten sind dabei kostenpflichtig,
        manche kostenlos. Fahrten in die Werkstatt z.B. sollte in der Regel kostenlos sein, da sie im Interesse aller in der Gemeinschaft sind. Wie ihr den 
        Umgang mit kostenpflichtigen und kostenlosen Fahrten regelt, bleibt aber natürlich eurer Gemeinschaft überlassen.</p>
        <p>Wenn ihr unterschiedlich Nutzungsgruppen angelegt habt, könnt ihr für jede Nutzungsgruppe einen eigenen Kilometerpreis vereinbaren. Das kann z.B. 
        sinnvoll sein, wenn ihr für Menschen die nur sehr selten fahren und sich nicht am Erhalt des Fahrzeugs beteiligen einen 
        höheren Kilometerpreis für sinnvoll haltet. Oder wenn Menschen mit niedrigerem Einkommen einen niedrigeren Kilometerpreis
        zahlen sollen als solche mit höherem Einkommen.</p>
        <p>Die Kosten für eine Fahrt werden in eurem Konto als "Schulden" vermerkt. Ausgaben die ihr während der Fahrt hattet (z.B. fürs Tanken) werden von 
        diesen Schulden abgezogen wenn ihr sie bei den Ausgaben eingetragen habt.</p>
    expenses:
      title: Ausgaben
      desc: |
        <p>Ausgaben sind das Beitragsbuch.</p>
        <p>Wer für Tanken, Wartung, Reifen oder andere gemeinsame Kosten aufkommt, bekommt diesen Beitrag auf seinem Konto wieder gutgeschrieben.</p>
        <p>Welche Ausgaben abzugsfähig sind müsst ihr in der Gemeinschaft besprechen. Tanken, Öl und Scheibenwischwasser z.B. sollten klar sein. Ob der 
        Duftbaum mit Neuwagengeruch auch abzugsfähig ist, darüber könnt ihr euch streiten.</p>
    payments:
      title: Zahlungen
      desc: |
        <p>Zahlungen gleichen die Salden zwischen den Mitgliedern aus.</p>
        <p>Wenn sich größere Plus- oder Minusstände aufbauen, könnt ihr die Ausgleichszahlungen hier dokumentieren.</p>
        <p>Wenn jemand einer anderen Person in der Gruppe Geld gibt oder überweist um Kontostände auszugleichen, tragt es einfach hier ein.</p>

    parking:
      title: Parkposition
      desc: |
        <p>Die Parkseite löst das letzte praktische Problem des Teilens: Wo steht das Auto gerade?</p>
        <p>Ihr könnt euch dort zum Fahrzeug navigieren lassen und selbst die aktuelle Parkposition des Fahrzeugs speichern wenn ihr eure Fahrt beendet habt.</p>
        <p>So findet die nächste Person das Fahrzeug ohne zusätzliche Rückfragen.</p>
        <p><strong>Vergesst das am Ende eurer Fahrt nicht!</strong> Das erspart der nächten Nutzer:in wahrscheinlich etwas Stress.<p>
        <p>Hinweis: Mit dem Smartphone nutzt Car Coop das Ortungssystem eures Smartphones um die Position zu speichern. Wenn das nicht funktioniert könnt ihr 
        manuell auf der Karte die Position des Fahrzeugs setzen und speichern</p>
    admin:
      title: Administration
      desc: |
        <p>Im Administrationsbereich pflegt ihr die Regeln eurer Fahrgemeinschaft.</p>
        <p>Dort verwaltet ihr Mitglieder, Nutzungsgruppen, Kilometerpreise, Einladungen für neue Nutzende und weitere Grundeinstellungen.</p>
        <p>Wenn Menschen aus eurer Gemeinschaft ausscheiden, könnt ihr ihre Accounts dort deaktivieren. Die Fahrtenbuch- und Ausgabeneinträge bleiben dabei 
        erhalten</p>
        <p>Car Coop hat ein sehr offenes Administrationkonzept: Jedes Mitglied der Gruppe kann Änderungen vornehmen. Für das Absprechen ob alle mit den 
        Änderungen einverstanden sind, seit ihr verantwortlich. Das kann und will euch Car Coop nicht abnehmen.</p>
    user:
      title: Dein Profil
      desc: | 
        <p>Im Profil verwaltest du Sprache, Design, Benachrichtigungen und persönliche Einstellungen.</p>
        <p>Wenn du möchtest, kannst du den Tour-Hinweis später hier auch wieder aktivieren.</p>
  progress: "{{current}} von {{total}}"
  btn:
    next: Weiter
    prev: Zurück
    done: Fertig

board_system:
  trip_added: "<strong>%user%</strong> hat eine neue Fahrt mit <strong>%car%</strong> hinzugefügt."
  booking_added: "<strong>%user%</strong> hat eine neue Buchung für <strong>%car%</strong> erstellt (<em>%start%</em> – <em>%end%</em>)."
  booking_updated: "<strong>%user%</strong> hat eine Buchung für <strong>%car%</strong> aktualisiert."
  booking_deleted: "<strong>%user%</strong> hat eine Buchung für <strong>%car%</strong> gelöscht: <em>%title%</em> (%start% – %end%)."
  payment_added: "<strong>%from%</strong> hat eine Zahlung an <strong>%to%</strong> für <strong>%car%</strong> gesendet."
  invitation_created: "<strong>%user%</strong> hat <em>%email%</em> eingeladen, <strong>%car%</strong> beizutreten."
  invitation_accepted: "<strong>%user%</strong> ist <strong>%car%</strong> beigetreten."
  user_removed: "<strong>%user%</strong> hat <strong>%car%</strong> verlassen oder wurde entfernt."
  price_per_unit_changed: "Der Preis pro Einheit für die Gruppe <strong>%group%</strong> bei <strong>%car%</strong> wurde von %old_price% € auf <strong>%new_price% €</strong> geändert."
  milestone_100k: |
    <p><strong>%car%</strong> hat soeben <strong>100.000 %unit%</strong> erreicht! Der Tacho zeigt erstmals sechs Stellen &mdash; ein historischer Moment!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Wenn alles unter Kontrolle zu sein scheint, fährst du nicht schnell genug.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Mario Andretti</figcaption></figure>
  milestone_200k: |
    <p><strong>%car%</strong> überschreitet <strong>200.000 %unit%</strong>! Zweihunderttausend &mdash; das sind ungefähr fünf Erdumrundungen. Keine Erklärungen nötig &mdash; das ist pure Hingabe!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Wenn man gewinnt, macht man sich nicht viele Gedanken darüber. Nur wenn man verliert, sucht man Erklärungen.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Niki Lauda</figcaption></figure>
  milestone_300k: |
    <p><strong>%car%</strong> erreicht <strong>300.000 %unit%</strong>! Damit hättest du bis zum Mond und fast wieder zurückfahren können. Und <strong>%car%</strong> hat eindeutig alles gegeben!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Man verpflichtet sich auf einem Niveau, bei dem es keine Kompromisse gibt. Man gibt alles, was man hat.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Ayrton Senna</figcaption></figure>
  milestone_400k: |
    <p><strong>%car%</strong> jagt an <strong>400.000 %unit%</strong> vorbei! Das entspricht der Entfernung zum Mond &mdash; zurückgelegt auf vier Rädern! Keine Katastrophen hier &mdash; nur herrlicher Kilometerstand!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Um in diesem Spiel etwas zu erreichen, muss man bereit sein, auf der Grenze zur Katastrophe zu tanzen.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Stirling Moss</figcaption></figure>
  milestone_500k: |
    <p>EINE HALBE MILLION! <strong>%car%</strong> cruist an <strong>500.000 %unit%</strong> vorbei! Fünfhunderttausend &mdash; auf halbem Weg zur Legende. Heute kam alles wunderbar zusammen.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;So vieles musste zusammenkommen: das Auto, das Team, der Fahrer.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Michael Schumacher</figcaption></figure>
  milestone_600k: |
    <p><strong>%car%</strong> pflügt durch <strong>600.000 %unit%</strong>! Das sind fünfzehn Erdumrundungen. Und <strong>%car%</strong> hat uns durch jeden Kilometer des Wandels getragen.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Der Wandel kommt nicht, wenn wir auf andere Personen oder andere Zeiten warten. Wir sind es, auf die wir gewartet haben.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Barack Obama</figcaption></figure>
  milestone_700k: |
    <p><strong>%car%</strong> schießt an <strong>700.000 %unit%</strong> vorbei! Auf dieser Strecke hättest du fast die Route von der Erde zur Venus zurückgelegt. Treffender könnte man es nicht sagen.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Ich fahre einfach gerne schnell.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Jim Clark</figcaption></figure>
  milestone_800k: |
    <p><strong>%car%</strong> rast an <strong>800.000 %unit%</strong> vorbei! Nur noch 200.000 bis zur magischen Million! <strong>%car%</strong> ist der lebende &mdash; und fahrende &mdash; Beweis!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Racing is a great mania to which one must sacrifice everything.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; S&eacute;bastien Loeb</figcaption></figure>
  milestone_900k: |
    <p><strong>%car%</strong> donnert durch <strong>900.000 %unit%</strong>! Der vorletzte Meilenstein &mdash; nur noch hunderttausend! Für <strong>%car%</strong> ist dies sehr wohl der Beginn des Endes &mdash; des Weges zur Million!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Dies ist nicht das Ende. Es ist nicht einmal der Anfang des Endes. Aber es ist vielleicht das Ende des Anfangs.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Winston Churchill</figcaption></figure>
  milestone_1000k: |
    <p>EINE MILLION! <strong>%car%</strong> bezwingt den ultimativen Meilenstein: <strong>1.000.000 %unit%</strong>! Heute macht <strong>%car%</strong> seinen eigenen Riesensprung in die Automobilgeschichte. HERZLICHEN GLÜCKWUNSCH!</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Das ist ein kleiner Schritt für einen Menschen, aber ein riesiger Sprung für die Menschheit.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; Neil Armstrong</figcaption></figure>
  milestone_repeating: |
    <p><strong>%car%</strong> hat soeben <strong>%milestone% %unit%</strong> überschritten &mdash; was für eine wunderschön poetische Zahl! Diese Palindromziffern kommen nicht jeden Tag vor.</p>
    <figure style="margin:0.75em 0 0"><blockquote style="margin:0;padding:0.5em 1em;border-left:3px solid #dee2e6"><em>&bdquo;Der Weg geht immer weiter, weit über das Tor hinaus, woher er kam.&ldquo;</em></blockquote><figcaption style="text-align:right;font-size:0.875em;color:#6c757d;margin-top:0.25em">&mdash; J.R.R. Tolkien</figcaption></figure>
